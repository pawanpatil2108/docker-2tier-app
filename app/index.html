<!DOCTYPE html>
<html>
<head>
    <title>Docker 2-Tier App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg p-4">
        <h2 class="text-center text-primary">
            🚀 Docker 2-Tier Application
        </h2>

        <div class="text-center mt-3">
            <span class="badge bg-success fs-6">Web Service: Running</span>
            <span class="badge bg-info fs-6 ms-2">Database: MySQL</span>
        </div>

        <hr>

        <p class="fs-5 text-center">
            This application demonstrates a <strong>monolithic web app</strong>
            containerized using <strong>Docker & Docker Compose</strong>.
        </p>

        <div class="text-center mt-4">
            <button class="btn btn-outline-primary btn-lg">
                Health Check OK
            </button>
        </div>
    </div>

    <footer class="text-center mt-4 text-muted">
        <small>Built with ❤️ using Docker | DevOps Practice Project</small>
    </footer>
</div>

</body>
</html>
